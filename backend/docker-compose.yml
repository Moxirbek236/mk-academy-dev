services:
  backend:
    container_name: mk_academy_backend
    image: ghcr.io/moxirbek236/mk-academy-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3232}:${PORT:-3232}"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3232}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-file:/app/data/mk-academy.db}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      CORS_ALLOW_LOCALHOST: ${CORS_ALLOW_LOCALHOST:-false}
      THROTTLE_TTL: ${THROTTLE_TTL:-60000}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-120}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30d}
      BCRYPT_SALT: ${BCRYPT_SALT:-10}
      FRONTEND_URL: ${FRONTEND_URL}
      FRONTEND_URLS: ${FRONTEND_URLS:-}
      BOT_TOKEN: ${BOT_TOKEN}
      MAIN_CHANNEL_ID: ${MAIN_CHANNEL_ID}
      RESULTS_CHANNEL_ID: ${RESULTS_CHANNEL_ID}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS}
      ADMIN_TELEGRAM_USERNAMES: ${ADMIN_TELEGRAM_USERNAMES:-}
      SUPERADMIN_PHONE: ${SUPERADMIN_PHONE:-}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-}
      SUPERADMIN_FULL_NAME: ${SUPERADMIN_FULL_NAME:-}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-}
    volumes:
      - ${SQLITE_DATA_DIR:-/var/lib/mk-academy}:/app/data:Z
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3232}/api/system/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - mk_academy_network

networks:
  mk_academy_network:
    name: mk_academy_network
    driver: bridge

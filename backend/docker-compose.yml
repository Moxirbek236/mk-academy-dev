services:
  backend:
    container_name: mk_academy_backend
    image: ghcr.io/moxirbek236/mk-academy-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3232}:${PORT:-3232}"
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3232}
      DATABASE_URL: file:/app/data/prod.db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30d}
      BCRYPT_SALT: ${BCRYPT_SALT:-10}
      FRONTEND_URL: ${FRONTEND_URL}
      BOT_TOKEN: ${BOT_TOKEN}
      MAIN_CHANNEL_ID: ${MAIN_CHANNEL_ID}
      RESULTS_CHANNEL_ID: ${RESULTS_CHANNEL_ID}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS}
      ADMIN_TELEGRAM_USERNAMES: ${ADMIN_TELEGRAM_USERNAMES:-}
    volumes:
      - ${SQLITE_DATA_DIR:-/var/lib/mk-academy}:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3232}/api/system/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - mk_academy_network

networks:
  mk_academy_network:
    name: mk_academy_network
    driver: bridge

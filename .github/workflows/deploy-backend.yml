name: Backend Deploy (CI/CD)

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Push Backend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/moxirbek236/mk-academy-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Backend to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.SSH_HOST || secrets.SERVER_HOST }}
      DEPLOY_PORT: ${{ secrets.SSH_PORT || secrets.SERVER_PORT || '22' }}
      DEPLOY_USER: ${{ secrets.SSH_USER || secrets.SERVER_USER }}
      DEPLOY_KEY: ${{ secrets.SSH_PRIVATE_KEY || secrets.SERVER_SSH_KEY }}
      DEPLOY_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE || secrets.SERVER_SSH_PASSPHRASE }}
      DEPLOY_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
      DEPLOY_APP_DIR: /root/mk-academy-dev
      LEGACY_PM2_APPS: mk-academy mc-academy

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          test -n "$DEPLOY_HOST" || { echo "Missing deploy host secret (SSH_HOST or SERVER_HOST)"; exit 1; }
          test -n "$DEPLOY_USER" || { echo "Missing deploy user secret (SSH_USER or SERVER_USER)"; exit 1; }
          if [ -z "$DEPLOY_KEY" ] && [ -z "$DEPLOY_PASSWORD" ]; then
            echo "Missing authentication secret. Set SSH_PRIVATE_KEY (or SERVER_SSH_KEY) or SERVER_PASSWORD."
            exit 1
          fi

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          CR_PAT: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_APP_DIR: ${{ env.DEPLOY_APP_DIR }}
          LEGACY_PM2_APPS: ${{ env.LEGACY_PM2_APPS }}
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          password: ${{ env.DEPLOY_PASSWORD }}
          key: ${{ env.DEPLOY_KEY }}
          passphrase: ${{ env.DEPLOY_PASSPHRASE }}
          port: ${{ env.DEPLOY_PORT }}
          envs: CR_PAT,DEPLOY_APP_DIR,LEGACY_PM2_APPS
          script: |
            set -euo pipefail
            echo "$CR_PAT" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd "$DEPLOY_APP_DIR"
            git pull --ff-only origin main
            cd backend
            docker pull ghcr.io/moxirbek236/mk-academy-backend:latest
            export HOST_PORT="${HOST_PORT:-3232}"
            SQLITE_DATA_DIR="$(awk -F= '$1=="SQLITE_DATA_DIR" { print $2 }' .env 2>/dev/null | tail -n 1)"
            SQLITE_DATA_DIR="${SQLITE_DATA_DIR:-/var/lib/mk-academy}"

            if docker compose version >/dev/null 2>&1; then
              docker compose down --remove-orphans || true
            else
              docker-compose down --remove-orphans || true
            fi

            if docker ps -a --format '{{.Names}}' | awk '$0=="mk_academy_backend"{ found=1 } END{ exit !found }'; then
              docker rm -f mk_academy_backend
            fi
            if command -v podman >/dev/null 2>&1; then
              podman rm -f mk_academy_backend 2>/dev/null || true
              POD_IDS="$(podman pod ps --format '{{.ID}} {{.Name}}' 2>/dev/null | awk '$2 ~ /mk[_-]academy|mk_academy/ { print $1 }')"
              if [ -n "${POD_IDS}" ]; then
                echo "${POD_IDS}" | xargs -r podman pod rm -f
              fi
            fi

            PORT_CONFLICT_IDS="$(docker ps -a --format '{{.ID}} {{.Ports}}' | awk -v p=":${HOST_PORT}->" 'index($0, p) { print $1 }')"
            if [ -n "${PORT_CONFLICT_IDS}" ]; then
              echo "${PORT_CONFLICT_IDS}" | xargs -r docker rm -f
            fi

            PUBLISHED_PORT_IDS="$(docker ps -a --filter "publish=${HOST_PORT}" -q 2>/dev/null || true)"
            if [ -n "${PUBLISHED_PORT_IDS}" ]; then
              echo "${PUBLISHED_PORT_IDS}" | xargs -r docker rm -f
            fi

            if command -v pm2 >/dev/null 2>&1; then
              for app in ${LEGACY_PM2_APPS:-}; do
                if pm2 describe "$app" >/dev/null 2>&1; then
                  pm2 delete "$app" >/dev/null 2>&1 || pm2 stop "$app" >/dev/null 2>&1 || true
                fi
              done
              pm2 save --force >/dev/null 2>&1 || true
            fi

            echo "Checking host port ${HOST_PORT} before compose up..."
            if command -v ss >/dev/null 2>&1; then
              ss -ltnp "sport = :${HOST_PORT}" || true
            fi
            if command -v lsof >/dev/null 2>&1; then
              lsof -iTCP:"${HOST_PORT}" -sTCP:LISTEN || true
            fi
            if command -v fuser >/dev/null 2>&1; then
              fuser -k "${HOST_PORT}/tcp" || true
            fi
            sleep 3

            echo "Preparing SQLite data directory ${SQLITE_DATA_DIR}..."
            mkdir -p "$SQLITE_DATA_DIR"
            touch "$SQLITE_DATA_DIR/mk-academy.db"
            chown -R 1001:1001 "$SQLITE_DATA_DIR" || true
            chmod -R u+rwX,g+rwX "$SQLITE_DATA_DIR" || true

            if docker compose version >/dev/null 2>&1; then
              docker compose up -d --force-recreate --remove-orphans
            else
              docker-compose up -d --force-recreate --remove-orphans
            fi

            echo "Waiting for backend healthcheck..."
            for attempt in $(seq 1 30); do
              if command -v wget >/dev/null 2>&1; then
                HEALTH_OK="$(wget -qO- "http://127.0.0.1:${HOST_PORT}/api/system/health" >/dev/null 2>&1 && echo yes || echo no)"
              else
                HEALTH_OK="$(curl -fsS "http://127.0.0.1:${HOST_PORT}/api/system/health" >/dev/null 2>&1 && echo yes || echo no)"
              fi

              if [ "$HEALTH_OK" = "yes" ]; then
                echo "Backend is healthy."
                break
              fi

              if ! docker ps --filter "name=mk_academy_backend" --filter "status=running" -q | grep -q .; then
                docker ps -a --filter "name=mk_academy_backend"
                docker logs --tail 200 mk_academy_backend || true
                exit 1
              fi

              if [ "$attempt" -eq 30 ]; then
                docker ps -a --filter "name=mk_academy_backend"
                docker logs --tail 200 mk_academy_backend || true
                exit 1
              fi

              sleep 3
            done

            docker image prune -af --filter "until=24h"

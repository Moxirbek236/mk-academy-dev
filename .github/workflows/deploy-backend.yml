name: Backend Deploy (CI/CD)

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push Backend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/moxirbek236/mk-academy-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Backend to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.SSH_HOST || secrets.SERVER_HOST }}
      DEPLOY_PORT: ${{ secrets.SSH_PORT || secrets.SERVER_PORT || '22' }}
      DEPLOY_USER: ${{ secrets.SSH_USER || secrets.SERVER_USER }}
      DEPLOY_KEY: ${{ secrets.SSH_PRIVATE_KEY || secrets.SERVER_SSH_KEY }}
      DEPLOY_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE || secrets.SERVER_SSH_PASSPHRASE }}
      DEPLOY_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
      DEPLOY_APP_DIR: /root/mk-academy-dev

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          test -n "$DEPLOY_HOST" || { echo "Missing deploy host secret (SSH_HOST or SERVER_HOST)"; exit 1; }
          test -n "$DEPLOY_USER" || { echo "Missing deploy user secret (SSH_USER or SERVER_USER)"; exit 1; }
          if [ -z "$DEPLOY_KEY" ] && [ -z "$DEPLOY_PASSWORD" ]; then
            echo "Missing authentication secret. Set SSH_PRIVATE_KEY (or SERVER_SSH_KEY) or SERVER_PASSWORD."
            exit 1
          fi

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          CR_PAT: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_APP_DIR: ${{ env.DEPLOY_APP_DIR }}
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          password: ${{ env.DEPLOY_PASSWORD }}
          key: ${{ env.DEPLOY_KEY }}
          passphrase: ${{ env.DEPLOY_PASSPHRASE }}
          port: ${{ env.DEPLOY_PORT }}
          envs: CR_PAT,DEPLOY_APP_DIR
          script: |
            set -euo pipefail
            echo "$CR_PAT" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd "$DEPLOY_APP_DIR"
            git pull --ff-only origin main
            cd backend
            docker pull ghcr.io/moxirbek236/mk-academy-backend:latest
            export HOST_PORT="${HOST_PORT:-3232}"

            if docker ps -a --format '{{.Names}}' | awk '$0=="mk_academy_backend"{ found=1 } END{ exit !found }'; then
              docker rm -f mk_academy_backend
            fi

            PORT_CONFLICT_IDS="$(docker ps -a --format '{{.ID}} {{.Ports}}' | awk -v p=":${HOST_PORT}->" 'index($0, p) { print $1 }')"
            if [ -n "${PORT_CONFLICT_IDS}" ]; then
              echo "${PORT_CONFLICT_IDS}" | xargs -r docker rm -f
            fi

            if docker compose version >/dev/null 2>&1; then
              docker compose down --remove-orphans || true
              docker compose up -d --force-recreate
            else
              docker-compose down --remove-orphans || true
              docker-compose up -d --force-recreate
            fi

            docker image prune -af --filter "until=24h"

name: Frontend Mobile Apps Build (Android & iOS)

permissions:
  actions: read
  contents: write

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-mobile-build.yml'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify Node version
        run: |
          node --version
          npm --version

      - name: Install Dependencies
        working-directory: ./frontend
        run: |
          rm -rf package-lock.json node_modules
          npm install --include=optional

      - name: Build Next.js (Web)
        working-directory: ./frontend
        run: npm run build
        env:
          CAPACITOR_EXPORT: 'true'

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Sync Capacitor Android
        working-directory: ./frontend
        run: |
          if [ ! -f out/index.html ]; then
            CAPACITOR_EXPORT=true npm run build
          fi
          npx cap sync android

      - name: Build APK (Debug)
        working-directory: ./frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Prepare Android release asset
        working-directory: ./frontend
        run: cp android/app/build/outputs/apk/debug/app-debug.apk MK_Academy_Android.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: frontend/MK_Academy_Android.apk

  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify Node version
        run: |
          node --version
          npm --version
          which node

      - name: Install Dependencies
        working-directory: ./frontend
        run: |
          rm -rf package-lock.json node_modules
          npm install --include=optional

      - name: Build Next.js (Web)
        working-directory: ./frontend
        run: npm run build
        env:
          CAPACITOR_EXPORT: 'true'

      - name: Sync Capacitor iOS
        working-directory: ./frontend
        run: |
          if [ ! -f out/index.html ]; then
            CAPACITOR_EXPORT=true npm run build
          fi
          export PATH="$(dirname $(which node)):$PATH"
          npx cap sync ios

      - name: Resolve Swift Packages
        working-directory: ./frontend/ios/App
        run: |
          xcodebuild -project App.xcodeproj -scheme App -resolvePackageDependencies

      - name: Check iOS signing secrets
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          if [ -z "$IOS_CERTIFICATE_BASE64" ] || [ -z "$IOS_CERTIFICATE_PASSWORD" ] || [ -z "$IOS_PROVISIONING_PROFILE_BASE64" ] || [ -z "$IOS_TEAM_ID" ]; then
            echo "::error::iOS installable IPA requires IOS_CERTIFICATE_BASE64, IOS_CERTIFICATE_PASSWORD, IOS_PROVISIONING_PROFILE_BASE64, and IOS_TEAM_ID secrets."
            exit 1
          fi

      - name: Install iOS signing assets
        working-directory: ./frontend/ios/App
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD || 'mk-academy-build' }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/mk_academy_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/mk_academy.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/mk_academy.keychain-db"

          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          PROFILE_PLIST="$RUNNER_TEMP/mk_academy_profile.plist"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' "$PROFILE_PLIST")

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "IOS_PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Archive iOS App
        working-directory: ./frontend/ios/App
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID || 'com.mk.academy.student' }}
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ./build/App.xcarchive \
            clean archive \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROFILE_NAME"

      - name: Export signed IPA
        working-directory: ./frontend/ios/App
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID || 'com.mk.academy.student' }}
          IOS_EXPORT_METHOD: ${{ secrets.IOS_EXPORT_METHOD || 'ad-hoc' }}
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>$IOS_EXPORT_METHOD</string>
            <key>teamID</key>
            <string>$IOS_TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$IOS_BUNDLE_ID</key>
              <string>$IOS_PROFILE_NAME</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath ./build/App.xcarchive \
            -exportPath ./build/export \
            -exportOptionsPlist ExportOptions.plist

          cp ./build/export/*.ipa MK_Academy_iOS.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: frontend/ios/App/MK_Academy_iOS.ipa

  publish-latest-release:
    name: Publish latest mobile release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download mobile artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: frontend-mobile-latest
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID || 'com.mk.academy.student' }}
          IOS_APP_TITLE: MK Academy Student
        run: |
          IOS_IPA_URL="https://github.com/$GITHUB_REPOSITORY/releases/download/$RELEASE_TAG/MK_Academy_iOS.ipa"

          cat > MK_Academy_iOS.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>items</key>
            <array>
              <dict>
                <key>assets</key>
                <array>
                  <dict>
                    <key>kind</key>
                    <string>software-package</string>
                    <key>url</key>
                    <string>$IOS_IPA_URL</string>
                  </dict>
                </array>
                <key>metadata</key>
                <dict>
                  <key>bundle-identifier</key>
                  <string>$IOS_BUNDLE_ID</string>
                  <key>bundle-version</key>
                  <string>1.0</string>
                  <key>kind</key>
                  <string>software</string>
                  <key>title</key>
                  <string>$IOS_APP_TITLE</string>
                </dict>
              </dict>
            </array>
          </dict>
          </plist>
          EOF

          cat > RELEASE_NOTES.md <<EOF
          Latest frontend mobile builds.

          Commit: $GITHUB_SHA
          Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "Frontend mobile latest" --notes-file RELEASE_NOTES.md
          else
            gh release create "$RELEASE_TAG" --title "Frontend mobile latest" --notes-file RELEASE_NOTES.md
          fi

          gh release upload "$RELEASE_TAG" \
            release-assets/android-apk/MK_Academy_Android.apk \
            release-assets/ios-ipa/MK_Academy_iOS.ipa \
            MK_Academy_iOS.plist \
            --clobber

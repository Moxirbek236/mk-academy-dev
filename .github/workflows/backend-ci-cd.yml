name: Backend CI/CD

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: file:./prisma/ci.db

      - name: Build backend
        run: npm run build
        env:
          DATABASE_URL: file:./prisma/ci.db

      - name: Docker build smoke test
        run: docker build -t mk-academy-backend-ci .

  deploy-render:
    name: Deploy Backend to Render
    needs: ci
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_BACKEND_DEPLOY_HOOK_URL" ]; then
            echo "::warning::RENDER_BACKEND_DEPLOY_HOOK_URL secret is not set. Skipping Render deploy."
            exit 0
          fi

          curl --fail --silent --show-error --request POST "$RENDER_BACKEND_DEPLOY_HOOK_URL"
          echo "Render deploy triggered successfully."

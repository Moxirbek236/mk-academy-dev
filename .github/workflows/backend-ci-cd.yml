name: Backend CI/CD

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: file:./prisma/ci.db

      - name: Build backend
        run: npm run build
        env:
          DATABASE_URL: file:./prisma/ci.db

      - name: Docker build smoke test
        if: github.event_name == 'pull_request'
        run: docker build -t mk-academy-backend-ci .

  build-and-push:
    name: Build and Push Docker Image
    needs: ci
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/moxirbek236/mk-academy-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-digitalocean:
    name: Deploy Backend to DigitalOcean
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.SSH_HOST || secrets.SERVER_HOST }}
      DEPLOY_PORT: ${{ secrets.SSH_PORT || secrets.SERVER_PORT || '22' }}
      DEPLOY_USER: ${{ secrets.SSH_USER || secrets.SERVER_USER }}
      DEPLOY_KEY: ${{ secrets.SSH_PRIVATE_KEY || secrets.SERVER_SSH_KEY }}
      # Optional: only needed when the private key is passphrase-protected.
      DEPLOY_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE || secrets.SERVER_SSH_PASSPHRASE }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          test -n "$DEPLOY_HOST" || { echo "Missing deploy host secret (SSH_HOST or SERVER_HOST)"; exit 1; }
          test -n "$DEPLOY_USER" || { echo "Missing deploy user secret (SSH_USER or SERVER_USER)"; exit 1; }
          test -n "$DEPLOY_KEY" || { echo "Missing deploy key secret (SSH_PRIVATE_KEY or SERVER_SSH_KEY)"; exit 1; }

      - name: Copy docker-compose.yml to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          port: ${{ env.DEPLOY_PORT }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_KEY }}
          passphrase: ${{ env.DEPLOY_PASSPHRASE }}
          source: "backend/docker-compose.yml"
          target: "/root/mk_academy_deploy"
          strip_components: 1

      - name: Execute remote ssh commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          CR_PAT: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ env.DEPLOY_HOST }}
          port: ${{ env.DEPLOY_PORT }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_KEY }}
          passphrase: ${{ env.DEPLOY_PASSPHRASE }}
          envs: CR_PAT
          script: |
            set -euo pipefail
            echo $CR_PAT | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /root/mk-academy-dev/
            git pull origin main
            cd backend
            docker pull ghcr.io/moxirbek236/mk-academy-backend:latest
            export HOST_PORT="${HOST_PORT:-3232}"
            # Remove legacy container name if it exists to avoid name collisions.
            if docker ps -a --format '{{.Names}}' | awk '$0=="mk_academy_backend"{ found=1 } END{ exit !found }'; then
              docker rm -f mk_academy_backend
            fi
            # Free the configured host port if another old container still owns it.
            PORT_CONFLICT_IDS="$(docker ps -a --format '{{.ID}} {{.Ports}}' | awk -v p=":${HOST_PORT}->" 'index($0, p) { print $1 }')"
            if [ -n "${PORT_CONFLICT_IDS}" ]; then
              echo "${PORT_CONFLICT_IDS}" | xargs -r docker rm -f
            fi
            # Check if docker compose or docker-compose is available
            if command -v docker compose &> /dev/null; then
              docker compose down --remove-orphans || true
              docker compose up -d --force-recreate
            else
              docker-compose down --remove-orphans || true
              docker-compose up -d --force-recreate
            fi
            docker image prune -af --filter "until=24h"

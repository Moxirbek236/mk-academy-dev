name: Backend CI/CD

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: file:./prisma/ci.db

      - name: Build backend
        run: npm run build
        env:
          DATABASE_URL: file:./prisma/ci.db

      - name: Docker build smoke test
        if: github.event_name == 'pull_request'
        run: docker build -t mk-academy-backend-ci .

  build-and-push:
    name: Build and Push Docker Image
    needs: ci
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/moxirbek236/mk-academy-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-digitalocean:
    name: Deploy Backend to DigitalOcean
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "backend/docker-compose.yml"
          target: "~/mk_academy_deploy"
          strip_components: 1

      - name: Execute remote ssh commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          CR_PAT: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: CR_PAT
          script: |
            echo $CR_PAT | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd ~/mk_academy_deploy
            docker pull ghcr.io/moxirbek236/mk-academy-backend:latest
            # Check if docker compose or docker-compose is available
            if command -v docker compose &> /dev/null; then
              docker compose up -d
            else
              docker-compose up -d
            fi
            docker image prune -af --filter "until=24h"
